name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare all build files
        run: |
          set -x
          cp root_build_gradle.txt build.gradle
          echo "include ':app'" > settings.gradle
          bash setup_project.sh
          cp app_build_gradle.txt app/build.gradle
          echo "--- FILES IN ROOT ---"
          ls -la
          echo "--- build.gradle ---"
          cat build.gradle
          echo "--- settings.gradle ---"
          cat settings.gradle
          echo "--- app/build.gradle ---"
          cat app/build.gradle

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Verify files before build
        run: |
          echo "--- ls root ---"
          ls -la
          echo "--- which gradle ---"
          which gradle
          gradle --version

      - name: Build APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PriceWidget-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: PriceWidget v${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
