name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup project structure
        run: bash setup_project.sh

      - name: Install Gradle and generate wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          export PATH=/opt/gradle/gradle-8.4/bin:$PATH
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Create settings.gradle
        run: printf "include ':app'\n" > settings.gradle

      - name: Create root build.gradle
        run: |
          printf 'buildscript {\n    ext.kotlin_version = "1.9.0"\n    repositories { google(); mavenCentral() }\n    dependencies {\n        classpath "com.android.tools.build:gradle:8.1.0"\n        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${"$"}{kotlin_version}"\n    }\n}\nallprojects { repositories { google(); mavenCentral() } }\n' > build.gradle

      - name: Create app/build.gradle
        run: |
          printf 'plugins {\n    id "com.android.application"\n    id "kotlin-android"\n}\nandroid {\n    compileSdk 34\n    defaultConfig {\n        applicationId "com.pricewidget.widget"\n        minSdk 21\n        targetSdk 34\n        versionCode 1\n        versionName "1.0"\n    }\n    buildTypes { release { minifyEnabled false } }\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }\n    kotlinOptions { jvmTarget = "1.8" }\n}\ndependencies {\n    implementation "androidx.appcompat:appcompat:1.6.1"\n    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"\n}\n' > app/build.gradle

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PriceWidget-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: PriceWidget v${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
